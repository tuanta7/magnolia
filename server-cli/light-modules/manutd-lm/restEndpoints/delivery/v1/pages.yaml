class: info.magnolia.rest.delivery.jcr.v2.JcrDeliveryEndpointDefinition
workspace: website
rootPath: /
depth: 3
limit: 10
referenceDepth: 3
includeSystemProperties: true
systemProperties:
  - mgnl:template
  - mgnl:createdBy

nodeTypes:
  - mgnl:page
childNodeTypes:
  - mgnl:area
  - mgnl:component
  - mgnl:contentNode

references:
  - name: footerReference
    propertyName: defaultHeader
    referenceResolver:
      $type: jcrReferenceResolver
      targetWorkspace: headers
      depthInReferencedNode: 2
  - name: footerReference
    propertyName: defaultFooter
    referenceResolver:
      $type: jcrReferenceResolver
      targetWorkspace: footers
      depthInReferencedNode: 2
  - name: iconReference
    propertyName: icon
    referenceResolver:
      $type: assetReferenceResolver
  - name: heroImageReference
    propertyName: heroImage
    referenceResolver:
      $type: assetReferenceResolver
  - name: faqsReference
    propertyName: faqsRootFolder
    referenceResolver:
      depthInReferencedNode: 1
      $type: jcrReferenceResolver
      targetWorkspace: faqs
