class: info.magnolia.rest.delivery.jcr.v2.JcrDeliveryEndpointDefinition
workspace: website
rootPath: /
depth: 10
limit: 10
referenceDepth: 2
includeSystemProperties: true
systemProperties:
  - mgnl:template
  - mgnl:createdBy

nodeTypes:
  - mgnl:page
childNodeTypes:
  - mgnl:area
  - mgnl:component
  - mgnl:contentNode

references:
  - name: footerReference
    propertyName: footer
    referenceResolver:
      $type: jcrReferenceResolver
      targetWorkspace: footers
      depthInReferencedNode: 2
  - name: iconReference
    propertyName: icon
    referenceResolver:
      $type: assetReferenceResolver
