!content-type:post
name: posts-app
label: Posts
icon: icon-templating-app
permissions:
  roles:
    developer: developer
subApps:
  detail:
    label: Create new Post
    form:
      properties:
        - name: name
          $type: textField
          label: Name
        - name: title
          $type: textField
          label: Title
        - name: category
          $type: comboBoxField
          label: Category
          datasource:
            $type: optionListDatasource
            options:
              interviews:
                label: Interviews
                value: interviews
              podcast:
                label: Podcast
                value: podcast
              highlights:
                label: Highlights
                value: highlights
              news:
                label: News
                value: news
        - name: thumbnail
          $type: damLinkField
          label: Thumbnail
        - name: createdAt
          $type: dateField
          label: Created at
        - name: redirectLink
          $type: textField
          label: Redirect link
        - name: body
          $type: richTextField
          label: Body
