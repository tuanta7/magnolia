datasource:
  workspace: posts
  autoCreate: true

model:
  nodeType: mgnl:post
  properties:
    - name: name
      label: Name
      type: string
    - name: title
      label: Title
      type: string
    - name: category
      label: Category
      type: string
    - name: thumbnail
      label: Thumbnail
      type: asset
    - name: createdAt
      label: Created at
      type: date
    - name: redirectLink
      label: Redirect link
      type: string
    - name: body
      label: Body
      type: string
