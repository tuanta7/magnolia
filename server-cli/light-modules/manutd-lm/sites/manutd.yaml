name: manutd

domains:
  - name: localhost

templates:
  prototype:
    class: info.magnolia.pages.spa.template.SpaPrototypeTemplateDefinition
    baseUrl: http://localhost:3000
    routeTemplate: "{{@path}}"
  availability:
    templates:
      home:
        id: manutd-lm:pages/home
      players:
        id: manutd-lm:pages/players
      news:
        id: manutd-lm:pages/news
      faqs:
        id: faqs:pages/faq

mappings:
  manutd:
    URIPrefix: "/"
    handlePrefix: "/manutd"
    repository: website

cors:
  manutd:
    allowedMethods:
      GET: GET

i18n:
  class: info.magnolia.cms.i18n.DefaultI18nContentSupport
  defaultLocale: en
  enabled: true
  fallbackLocale: en
  locales:
    en:
      country: ""
      enabled: true
      language: en
    vi:
      country: ""
      enabled: true
      language: vi
    th:
      country: ""
      enabled: true
      language: th
