!content-type:faq
name: faqs-app
label: FAQs
permissions:
  roles:
    developer: developer
subApps:
  detail:
    label: New FAQ
    form:
      properties:
        - name: question
          $type: richTextField
        - name: answer
          $type: richTextField
        - name: highlights
          $type: checkBoxField
          label: Highlight
          buttonLabel: Mark as highlighted
        - name: mostAsked
          $type: checkBoxField
          label: Most asked
          buttonLabel: Mark as most asked
