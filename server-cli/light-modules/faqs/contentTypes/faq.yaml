datasource:
  workspace: faqs
  autoCreate: true

model:
  nodeType: mgnl:faq
  properties:
    - name: name
      label: Name
      type: string
    - name: question
      label: Question
      type: string
    - name: answer
      label: Answer
      type: string
    - name: categories
      label: Categories
      type: reference:category
      multiple: true
