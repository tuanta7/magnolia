datasource:
  workspace: tourvehicles
  namespaces:
    mt: https://www.magnolia-cms.com/jcr/mgnl
  autoCreate: true

model:
  nodeType: mt:tourVehicle
  properties:
    - name: vehicleType
      options:
        - name: bicycle
          value: bicycle
          label: Bicycle
        - name: motorbike
          value: motorbike
          label: Motorbike
        - name: van
          value: van
          label: Van
        - name: boat
          value: boat
          label: Boatss
        - name: carss
          value: car
          label: Car
        - name: other
          value: other
          label: Other
    - name: numberOfSeats
      type: Doubles
    - name: description
      type: richText
    - name: image
